<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ACKSTREET MD - Pairing</title>
<style>
  :root {
    --bg: #0d0f14;
    --panel: #161922;
    --accent: #25d366;
    --text: #e8e8e8;
    --muted: #8a8f98;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .card {
    background: var(--panel);
    border-radius: 16px;
    padding: 32px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
    color: var(--accent);
  }
  p.sub {
    color: var(--muted);
    margin: 0 0 24px;
    font-size: 14px;
  }
  input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #2a2f3a;
    background: #10131a;
    color: var(--text);
    font-size: 16px;
    margin-bottom: 14px;
  }
  button {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #06210f;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .result {
    margin-top: 20px;
    padding: 16px;
    border-radius: 10px;
    background: #10131a;
    border: 1px solid #2a2f3a;
    display: none;
    word-break: break-all;
  }
  .code {
    font-size: 28px;
    letter-spacing: 4px;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    margin: 10px 0;
  }
  .session-box {
    font-family: monospace;
    font-size: 12px;
    color: var(--muted);
    max-height: 120px;
    overflow-y: auto;
    margin-bottom: 10px;
  }
  .copy-btn {
    background: #2a2f3a;
    color: var(--text);
    margin-top: 8px;
  }
  .status {
    font-size: 13px;
    color: var(--muted);
    margin-top: 10px;
    text-align: center;
  }
  .error { color: #ff6b6b; }
</style>
</head>
<body>
  <div class="card">
    <h1>ACKSTREET MD</h1>
    <p class="sub">Enter your WhatsApp number to generate a pairing code and SESSION_ID.</p>

    <input id="phone" type="tel" placeholder="e.g. 2547XXXXXXXX (country code, no +)" />
    <button id="submitBtn">Generate Pairing Code</button>

    <div id="codeResult" class="result">
      <p class="status">Enter this code in WhatsApp → Linked Devices → Link with phone number:</p>
      <div class="code" id="pairCode">------</div>
    </div>

    <div id="sessionResult" class="result">
      <p class="status">✅ Paired! Copy this SESSION_ID into your bot's environment variables:</p>
      <div class="session-box" id="sessionId"></div>
      <button class="copy-btn" id="copyBtn">Copy SESSION_ID</button>
    </div>

    <div class="status" id="statusText"></div>
  </div>

<script>
  const submitBtn = document.getElementById('submitBtn');
  const phoneInput = document.getElementById('phone');
  const codeResult = document.getElementById('codeResult');
  const pairCode = document.getElementById('pairCode');
  const sessionResult = document.getElementById('sessionResult');
  const sessionIdBox = document.getElementById('sessionId');
  const copyBtn = document.getElementById('copyBtn');
  const statusText = document.getElementById('statusText');

  let pollTimer = null;

  submitBtn.addEventListener('click', async () => {
    const number = phoneInput.value.trim();
    if (!number) {
      statusText.textContent = 'Enter a phone number first.';
      statusText.classList.add('error');
      return;
    }

    statusText.classList.remove('error');
    statusText.textContent = 'Requesting pairing code...';
    submitBtn.disabled = true;
    codeResult.style.display = 'none';
    sessionResult.style.display = 'none';

    try {
      const res = await fetch('/api/pair', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number }),
      });
      const data = await res.json();

      if (!res.ok) {
        statusText.textContent = data.error || 'Something went wrong.';
        statusText.classList.add('error');
        submitBtn.disabled = false;
        return;
      }

      pollStatus(data.requestId);
    } catch (err) {
      statusText.textContent = 'Network error - try again.';
      statusText.classList.add('error');
      submitBtn.disabled = false;
    }
  });

  function pollStatus(requestId) {
    clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`/api/status/${requestId}`);
        const job = await res.json();

        if (job.status === 'waiting' && job.code) {
          pairCode.textContent = job.code;
          codeResult.style.display = 'block';
          statusText.textContent = 'Waiting for you to enter the code in WhatsApp...';
        }

        if (job.status === 'connected') {
          clearInterval(pollTimer);
          sessionIdBox.textContent = job.sessionId;
          sessionResult.style.display = 'block';
          statusText.textContent = 'Done! Paste this SESSION_ID into your bot host.';
          submitBtn.disabled = false;
        }

        if (job.status === 'error') {
          clearInterval(pollTimer);
          statusText.textContent = job.error || 'Pairing failed.';
          statusText.classList.add('error');
          submitBtn.disabled = false;
        }
      } catch (err) {
        // keep polling silently, transient network hiccup
      }
    }, 2000);
  }

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(sessionIdBox.textContent).then(() => {
      copyBtn.textContent = 'Copied!';
      setTimeout(() => (copyBtn.textContent = 'Copy SESSION_ID'), 2000);
    });
  });
</script>
</body>
  </html>
